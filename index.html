<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>価格管理システム</title>
  <script src="https://unpkg.com/@zxing/library@latest"></script>
  <style>
    body { font-family: sans-serif; padding: 15px; max-width: 600px; margin: auto; background: #f4f4f9; }
    .video-container { position: relative; width: 100%; background: #000; border-radius: 12px; overflow: hidden; line-height: 0; margin-bottom: 10px; }
    video { width: 100%; height: auto; aspect-ratio: 4 / 3; object-fit: cover; }
    .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70%; height: 25%; border: 2px solid #00ff00; box-shadow: 0 0 0 2000px rgba(0, 0, 0, 0.5); pointer-events: none; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
    button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
    #status { padding: 10px; text-align: center; color: #555; font-weight: bold; }
  </style>
</head>
<body>

  <div class="video-container">
    <video id="video" playsinline muted></video>
    <div class="overlay"></div>
  </div>

  <div class="card">
    <div id="status">バーコードをスキャンしてください</div>
    <input type="text" id="jan" placeholder="JANコード">
    <input type="text" id="store" placeholder="店舗名" value="マイストア">
    <input type="number" id="price" placeholder="税込価格" inputmode="numeric">
    <button id="submitBtn">スプレッドシートへ保存</button>
  </div>

  <script>
    // --- 【重要】ここにGASの /exec URLを貼り付け ---
    const GAS_URL = 'YOUR_GAS_WEB_APP_URL'; 

    const videoElement = document.getElementById('video');
    const statusElement = document.getElementById('status');
    const codeReader = new ZXing.BrowserMultiFormatReader();

    const decodeHints = new Map();
    decodeHints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8]);

    // カメラ起動
    async function startCamera() {
      try {
        const constraints = { video: { facingMode: "environment", width: { ideal: 1280 } } };
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        videoElement.srcObject = stream;
        
        codeReader.decodeFromVideoElement(videoElement, (result, err) => {
          if (result) {
            document.getElementById('jan').value = result.text;
            statusElement.innerText = "読み取り成功！カメラを停止しました";
            stopCamera(); // 読み取り後にカメラ停止
            if (navigator.vibrate) navigator.vibrate(150);
          }
        }, decodeHints);
      } catch (e) {
        statusElement.innerText = "エラー: " + e.message;
      }
    }

    // カメラ完全停止処理
    function stopCamera() {
      codeReader.reset(); // 解析停止
      if (videoElement.srcObject) {
        videoElement.srcObject.getTracks().forEach(track => track.stop());
        videoElement.srcObject = null;
      }
    }

    // 保存処理
    document.getElementById('submitBtn').onclick = async () => {
      const data = {
        jan: document.getElementById('jan').value,
        store: document.getElementById('store').value,
        price: document.getElementById('price').value
      };

      if (!data.jan || !data.price) {
        alert("入力が不足しています");
        return;
      }

      statusElement.innerText = "GASへ送信中...";
      
      try {
        // no-corsモードはレスポンスを受け取れないが、送信はされる
        await fetch(GAS_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        statusElement.innerText = "送信完了（シートを確認してください）";
        alert("送信しました");
        // 送信後にリロードしてリセット（必要なら）
        // location.reload(); 
      } catch (e) {
        statusElement.innerText = "通信エラー: " + e.message;
        alert("エラー: " + e.message);
      }
    };

    window.onload = startCamera;
  </script>
</body>
</html>
